<script>
  /* ============================================================
   *  Smartlearn вҖ” Client logic (Fase 3, responsif)
   * ============================================================ */

  var STATE = { token: null, user: null };
  var TOKEN_KEY = 'smartlearn_token';

  var MENUS = {
    admin: [['beranda','Beranda','home'], ['pengguna','Pengguna','users'], ['kelas','Kelas','grid'], ['materi','Materi','book'], ['soal','Soal & Ujian','clipboard'], ['pr','PR / Tugas','task'], ['analitik','Analitik','chart'], ['pengumuman','Pengumuman','speaker'], ['pesan','Pesan','message'], ['pengaturan','Pengaturan','settings']],
    guru:  [['beranda','Beranda','home'], ['materi','Materi','book'], ['soal','Soal & Ujian','clipboard'], ['pr','PR / Tugas','task'], ['siswa','Data Siswa','users'], ['analitik','Analitik','chart'], ['pengumuman','Pengumuman','speaker'], ['pesan','Pesan','message'], ['chat','Chat Kelas','chats'], ['pengaturan','Pengaturan','settings']],
    siswa: [['beranda','Beranda','home'], ['materi','Materi','book'], ['latihan','Latihan','pencil'], ['pr','PR / Tugas','task'], ['nilai','Nilai & Badge','trophy'], ['pengumuman','Pengumuman','speaker'], ['pesan','Pesan','message'], ['chat','Chat Kelas','chats']]
  };

  function callServer(fnName) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject) {
      if (!google.script.run || typeof google.script.run[fnName] !== 'function') {
        reject(new Error('Fungsi server "' + fnName + '" belum tersedia. Simpan kode server lalu Deploy versi baru (Manage deployments вҶ’ New version).'));
        return;
      }
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fnName].apply(google.script.run, args);
    });
  }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function showView(id){ ['view-loading','view-login','view-app'].forEach(function(v){ document.getElementById(v).classList.toggle('hidden', v!==id); }); }
  function showAlert(m){ var e=document.getElementById('login-alert'); e.textContent=m; e.classList.add('show'); }
  function hideAlert(){ document.getElementById('login-alert').classList.remove('show'); }
  function setMain(h){ document.getElementById('main-content').innerHTML=h; }
  function loadingMain(){ setMain('<div class="spinner"></div>'); }

  /* Sidebar mobile */
  function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-backdrop').classList.toggle('show'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-backdrop').classList.remove('show'); }

  /* Init */
  window.addEventListener('DOMContentLoaded', function(){
    var saved = localStorage.getItem(TOKEN_KEY);
    if (!saved){ showView('view-login'); return; }
    callServer('validateSession', saved).then(function(user){
      if (user){ STATE.token=saved; STATE.user=user; enterApp(); }
      else { localStorage.removeItem(TOKEN_KEY); showView('view-login'); }
    }).catch(function(){ localStorage.removeItem(TOKEN_KEY); showView('view-login'); });
  });

  /* Login/Logout */
  function doManualLogin(){
    hideAlert();
    var email=document.getElementById('login-email').value.trim();
    var password=document.getElementById('login-password').value;
    if(!email||!password){ showAlert('Email dan password wajib diisi.'); return; }
    var btn=document.getElementById('btn-login'); btn.disabled=true; btn.textContent='Memproses...';
    callServer('serverLogin', email, password).then(function(res){
      if(res.success){ STATE.token=res.token; STATE.user=res.user; localStorage.setItem(TOKEN_KEY,res.token); enterApp(); }
      else { showAlert(res.message); btn.disabled=false; btn.textContent='Masuk'; }
    }).catch(function(e){ showAlert('Kesalahan: '+e.message); btn.disabled=false; btn.textContent='Masuk'; });
  }
  function doGoogleLogin(){
    hideAlert();
    var btn=document.getElementById('btn-google'); btn.disabled=true; btn.textContent='Memproses...';
    callServer('serverGoogleLogin').then(function(res){
      if(res.success){ STATE.token=res.token; STATE.user=res.user; localStorage.setItem(TOKEN_KEY,res.token); enterApp(); }
      else { showAlert(res.message); btn.disabled=false; btn.innerHTML=googleBtnLabel(); }
    }).catch(function(e){ showAlert('Kesalahan: '+e.message); btn.disabled=false; btn.innerHTML=googleBtnLabel(); });
  }
  function googleBtnLabel(){ return '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.33 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.67 14.62 48 24 48z"/></svg> Masuk dengan Google'; }
  function doLogout(){
    confirmDialog({ title:'Keluar', message:'Yakin ingin keluar dari Smartlearn?', okLabel:'Keluar', danger:true, onOk:function(){
      var t=STATE.token; localStorage.removeItem(TOKEN_KEY); STATE={token:null,user:null};
      callServer('serverLogout', t).catch(function(){});
      document.getElementById('login-email').value=''; document.getElementById('login-password').value='';
      document.getElementById('btn-login').disabled=false; document.getElementById('btn-login').textContent='Masuk';
      showView('view-login');
    }});
  }

  function enterApp(){
    var u=STATE.user;
    document.getElementById('topbar-user').textContent=u.nama+' В· '+roleLabel(u.role)+(u.kelas?' В· '+u.kelas:'');
    document.getElementById('topbar-avatar').textContent=initials(u.nama);
    renderSidebar(u.role);
    navigate('beranda');
    showView('view-app');
    updateNotifBadge();
    if(NOTIF_TIMER) clearInterval(NOTIF_TIMER);
    NOTIF_TIMER=setInterval(updateNotifBadge, 45000);
  }
  function roleLabel(r){ return {admin:'Admin',guru:'Guru',siswa:'Siswa'}[r]||r; }
  function initials(n){ return n.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase(); }

  function renderSidebar(role){
    var list=MENUS[role]||MENUS.siswa;
    document.getElementById('sidebar').innerHTML=list.map(function(m){
      var badge = m[0]==='notifikasi' ? '<span id="notif-badge" style="display:none;margin-left:auto;background:#EF4444;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;line-height:1.6"></span>' : '';
      return '<div class="nav-item" data-page="'+m[0]+'" onclick="navigate(\''+m[0]+'\')" style="display:flex;align-items:center;gap:10px">'+iconSvg(m[2])+' <span>'+m[1]+'</span>'+badge+'</div>';
    }).join('');
  }
  var NOTIF_TIMER=null;
  function updateNotifBadge(){
    if(!STATE.token) return;
    callServer('hitungNotifBelum',STATE.token).then(function(r){
      var el=document.getElementById('tb-notif-badge'); if(!el) return;
      var c=(r&&r.count)||0;
      if(c>0){ el.textContent=c>99?'99+':c; el.style.display=''; } else { el.style.display='none'; }
    }).catch(function(){});
  }
  function iconSvg(name){
    var p={
      home:'<path d="M3 12l9-9 9 9M5 10v10h14V10"/>',
      users:'<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0112 0M16 6a3 3 0 010 6"/>',
      settings:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>',
      book:'<path d="M4 5a2 2 0 012-2h12v18H6a2 2 0 01-2-2z"/>',
      clipboard:'<rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3h6v1M9 10h6M9 14h4"/>',
      pencil:'<path d="M4 20h4L18 10l-4-4L4 16z"/>',
      trophy:'<path d="M8 4h8v5a4 4 0 01-8 0zM12 13v4M9 21h6"/>',
      chart:'<path d="M4 20V10M10 20V4M16 20v-7M21 20H3"/>',
      speaker:'<path d="M3 10v4h4l5 4V6L7 10H3zM16 8a4 4 0 010 8"/>',
      message:'<path d="M4 5h16v11H8l-4 4V5z"/>',
      chats:'<path d="M4 4h12v9H8l-4 4V4zM20 9v8l-3-3"/>',
      task:'<path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
      grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
      bell:'<path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/>'
    };
    return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+(p[name]||'')+'</svg>';
  }

  /* ===================== NOTIFIKASI ===================== */
  function notifIcon(t){ return t==='materi'?'рҹ“ҳ':t==='soal'?'рҹ“қ':t==='pr'?'рҹ“Ң':t==='pr_selesai'?'вң…':'рҹ””'; }
  var MATERI_FOCUS=null, SOAL_FOCUS=null, LATIHAN_FOCUS=null, PR_FOCUS=null, NOTIF_LIST=[];
  function notifTarget(tipe){
    var role=STATE.user.role;
    if(tipe==='materi') return 'materi';
    if(tipe==='soal') return (role==='siswa')?'latihan':'soal';
    if(tipe==='pr'||tipe==='pr_selesai') return 'pr';
    return '';
  }
  function focusCard(id){
    setTimeout(function(){ var el=document.getElementById(id); if(!el) return; el.scrollIntoView({behavior:'smooth',block:'center'}); var old=el.style.background; el.style.transition='background .4s'; el.style.background='#FEF9C3'; setTimeout(function(){ el.style.background=old||''; },1800); },80);
  }
  function bukaNotifIdx(i){
    var n=(NOTIF_LIST||[])[i]; if(!n) return;
    var ref={}; try{ ref=JSON.parse(n.ref||'{}'); }catch(e){}
    // Fallback dari teks bila ref kosong (notif lama / kolom ref belum ada)
    var j=String(n.judul||''); var judulItem=(j.indexOf(': ')!==-1)?j.substring(j.indexOf(': ')+2).trim():'';
    var mapelTxt=(String(n.pesan||'').replace(/^Mapel\s*/i,'').split(' В· ')[0]||'').trim();
    updateNotifBadge();
    var role=STATE.user.role, t=n.tipe;
    if(t==='materi'){ MATERI_FOCUS={mapel:ref.mapel||mapelTxt||'', q:ref.q||judulItem||''}; navigate('materi'); }
    else if(t==='soal'){ if(role==='siswa'){ LATIHAN_FOCUS={id:ref.id||'', q:ref.nama||judulItem||''}; navigate('latihan'); } else { SOAL_FOCUS={mapel:ref.mapel||mapelTxt||'', q:ref.nama||judulItem||''}; navigate('soal'); } }
    else if(t==='pr'||t==='pr_selesai'){ PR_FOCUS={id:ref.id||'', q:judulItem||''}; navigate('pr'); }
  }
  function renderNotifikasi(){
    loadingMain();
    callServer('listNotifikasi',STATE.token).then(function(list){
      NOTIF_LIST=list;
      var html=head('Notifikasi','Pemberitahuan terbaru untukmu В· klik untuk membuka');
      if(!list.length){ html+='<div class="empty">Belum ada notifikasi.</div>'; setMain(html); return; }
      html+='<div class="info-card" style="padding:8px">';
      html+=list.map(function(n,i){
        var bg=n.dibaca?'':'background:#FAF5FF;';
        var pg=notifTarget(n.tipe);
        var arrow=pg?'<div style="align-self:center;color:var(--soft);font-size:16px">вҖә</div>':'';
        var click=pg?(' onclick="bukaNotifIdx('+i+')" style="cursor:pointer;'):' style="';
        return '<div'+click+'display:flex;gap:10px;padding:11px 12px;border-radius:10px;'+bg+'border-bottom:0.5px solid var(--line2)"><div style="font-size:18px;line-height:1.3">'+notifIcon(n.tipe)+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+esc(n.judul)+(n.dibaca?'':' <span style="display:inline-block;width:7px;height:7px;background:#EF4444;border-radius:50%;vertical-align:middle"></span>')+'</div><div style="font-size:12px;color:var(--muted);margin-top:2px">'+esc(n.pesan)+'</div><div style="font-size:11px;color:var(--soft);margin-top:3px">'+esc(n.waktu)+(pg?' В· <span style="color:#7C3AED">Lihat вҶ’</span>':'')+'</div></div>'+arrow+'</div>';
      }).join('');
      html+='</div>';
      setMain(html);
      // Tandai semua dibaca setelah dibuka, lalu perbarui badge
      callServer('tandaiNotifDibaca',STATE.token).then(function(){ updateNotifBadge(); }).catch(function(){});
    }).catch(errMain);
  }

  /* ===================== PROFIL ===================== */
  function jkLabel(v){ return v==='L'?'Laki-laki':v==='P'?'Perempuan':'-'; }
  function renderProfil(){
    loadingMain();
    callServer('getProfil',STATE.token).then(function(d){
      if(!d||!d.success){ toast(d&&d.message?d.message:'Gagal memuat profil','err'); return; }
      var isSiswa=d.role==='siswa';
      var f=function(id,label,val,type){ return '<div class="form-group"><label class="label">'+label+'</label><input class="input" id="'+id+'" '+(type?'type="'+type+'" ':'')+'value="'+esc(val||'')+'"></div>'; };
      var html=head('Profil Saya', roleLabel(d.role)+(d.kelas?' В· '+esc(d.kelas):''));
      html+='<div class="info-card"><div class="info-card-title">Biodata</div>';
      html+='<div class="grid-2">'+f('pf-nis','NIS / ID', d.nis)+f('pf-nama','Nama (tampilan)', d.nama)+'</div>';
      html+='<div class="grid-2">'+f('pf-lengkap','Nama Lengkap', d.nama_lengkap)+f('pf-panggilan','Nama Panggilan', d.nama_panggilan)+'</div>';
      html+='<div class="grid-2"><div class="form-group"><label class="label">Jenis Kelamin</label><select class="input" id="pf-jk"><option value="">- pilih -</option><option value="L"'+(d.jenis_kelamin==='L'?' selected':'')+'>Laki-laki</option><option value="P"'+(d.jenis_kelamin==='P'?' selected':'')+'>Perempuan</option></select></div>'+f('pf-tgl','Tanggal Lahir', d.tanggal_lahir,'date')+'</div>';
      html+='<div class="grid-2">'+f('pf-tempat','Tempat Lahir', d.tempat_lahir)+f('pf-hp','No. HP', d.no_hp)+'</div>';
      html+='<div class="form-group"><label class="label">Alamat</label><textarea class="input" id="pf-alamat" rows="2">'+esc(d.alamat||'')+'</textarea></div>';
      html+='<div class="grid-2">'+f('pf-wali','Nama Orang Tua / Wali', d.nama_wali)+f('pf-hpwali','No. HP Orang Tua / Wali', d.no_hp_wali)+'</div>';
      html+='<div class="form-group"><label class="label">Email (tidak bisa diubah di sini)</label><input class="input" value="'+esc(d.email||'')+'" disabled></div>';
      html+='<div id="pf-alert" class="alert"></div>';
      html+='<div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" id="pf-save" onclick="submitProfil()">Simpan Biodata</button></div>';
      html+='</div>';

      // Ganti password
      html+='<div class="info-card"><div class="info-card-title">Ganti Password</div>'+
        '<div class="grid-2"><div class="form-group"><label class="label">Password Lama</label><input class="input" type="password" id="pw-lama"></div><div class="form-group"><label class="label">Password Baru (min. 5)</label><input class="input" type="password" id="pw-baru"></div></div>'+
        '<div class="form-group"><label class="label">Ulangi Password Baru</label><input class="input" type="password" id="pw-ulang"></div>'+
        '<div id="pw-alert" class="alert"></div>'+
        '<div style="display:flex;justify-content:flex-end"><button class="btn" id="pw-save" onclick="submitGantiPassword()">Ubah Password</button></div></div>';

      // Keluar
      html+='<div style="margin-top:8px"><button class="btn btn-danger" style="width:100%" onclick="doLogout()">Keluar dari Akun</button></div>';
      setMain(html);
    }).catch(errMain);
  }
  function submitProfil(){
    var al=document.getElementById('pf-alert'); al.classList.remove('show');
    var data={ nis:val('pf-nis'), nama:val('pf-nama'), nama_lengkap:val('pf-lengkap'), nama_panggilan:val('pf-panggilan'), jenis_kelamin:document.getElementById('pf-jk').value, tanggal_lahir:val('pf-tgl'), tempat_lahir:val('pf-tempat'), no_hp:val('pf-hp'), alamat:val('pf-alamat'), nama_wali:val('pf-wali'), no_hp_wali:val('pf-hpwali') };
    if(!data.nama){ al.textContent='Nama tampilan wajib diisi.'; al.classList.add('show'); return; }
    var b=document.getElementById('pf-save'); b.disabled=true; b.textContent='Menyimpan...';
    callServer('updateProfil',STATE.token,data).then(function(res){
      if(res.success){ STATE.user.nama=data.nama; document.getElementById('topbar-user').textContent=STATE.user.nama+' В· '+roleLabel(STATE.user.role)+(STATE.user.kelas?' В· '+STATE.user.kelas:''); document.getElementById('topbar-avatar').textContent=initials(STATE.user.nama); toast('Biodata disimpan'); b.disabled=false; b.textContent='Simpan Biodata'; }
      else { al.textContent=res.message; al.classList.add('show'); b.disabled=false; b.textContent='Simpan Biodata'; }
    }).catch(function(e){ al.textContent='Kesalahan: '+e.message; al.classList.add('show'); b.disabled=false; b.textContent='Simpan Biodata'; });
  }
  function val(id){ var el=document.getElementById(id); return el?el.value.trim():''; }
  function submitGantiPassword(){
    var al=document.getElementById('pw-alert'); al.classList.remove('show');
    var lama=document.getElementById('pw-lama').value, baru=document.getElementById('pw-baru').value, ulang=document.getElementById('pw-ulang').value;
    if(!lama||!baru){ al.textContent='Isi password lama dan baru.'; al.classList.add('show'); return; }
    if(baru.length<5){ al.textContent='Password baru minimal 5 karakter.'; al.classList.add('show'); return; }
    if(baru!==ulang){ al.textContent='Ulangi password baru tidak cocok.'; al.classList.add('show'); return; }
    var b=document.getElementById('pw-save'); b.disabled=true; b.textContent='Memproses...';
    callServer('gantiPasswordSendiri',STATE.token,lama,baru).then(function(res){
      if(res.success){ toast('Password berhasil diubah'); document.getElementById('pw-lama').value=''; document.getElementById('pw-baru').value=''; document.getElementById('pw-ulang').value=''; }
      else { al.textContent=res.message; al.classList.add('show'); }
      b.disabled=false; b.textContent='Ubah Password';
    }).catch(function(e){ al.textContent='Kesalahan: '+e.message; al.classList.add('show'); b.disabled=false; b.textContent='Ubah Password'; });
  }

  /* ROUTER */
  function navigate(page){
    document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.toggle('active', n.getAttribute('data-page')===page); });
    closeSidebar();
    if(page==='beranda')   return renderBeranda();
    if(page==='profil')    return renderProfil();
    if(page==='notifikasi')return renderNotifikasi();
    if(page==='materi')    return renderMateri();
    if(page==='soal')      return renderSoal();
    if(page==='siswa')     return renderDataSiswa();
    if(page==='pengguna')  return renderPengguna();
    if(page==='kelas')     return renderKelas();
    if(page==='latihan')   return renderLatihan();
    if(page==='pr')        return renderPR();
    if(page==='nilai')     return renderNilai();
    if(page==='analitik')  return renderAnalitik();
    if(page==='pengumuman')return renderPengumuman();
    if(page==='pesan')     return renderPesan();
    if(page==='chat')      return renderChat();
    if(page==='pengaturan')return renderPengaturan();
    setMain('<div class="empty">Halaman tidak ditemukan.</div>');
  }

  /* ===================== BERANDA ===================== */
  function renderBeranda(){
    loadingMain();
    var u=STATE.user;
    if(u.role==='siswa'){
      Promise.all([callServer('getSiswaDashboard',STATE.token), callServer('listPengumuman',STATE.token)]).then(function(r){
        var d=r[0], peng=r[1];
        var base=lvlBase(d.level);
        var pct=d.xp_next?Math.min(100,Math.round((d.xp-base)/(d.xp_next-base)*100)):100;
        var warnKelas = !d.kelas ? '<div class="info-card" style="border-left:3px solid #EF4444"><div style="font-size:13px;color:#B91C1C;font-weight:600;margin-bottom:2px">Kamu belum terdaftar di kelas mana pun</div><div style="font-size:12px;color:var(--muted)">Materi, latihan, dan PR muncul berdasarkan kelas. Hubungi guru/admin untuk dimasukkan ke kelas.</div></div>' : '';
        setMain(
          head('Selamat datang, '+esc(u.nama)+'! рҹ‘Ӣ','Terus semangat berlatih.')+
          warnKelas+
          '<div class="metrics">'+metric('m1','Level','Lv '+d.level)+metric('m2','XP',Number(d.xp).toLocaleString('id-ID'))+metric('m3','Rata-rata',d.rata_skor)+metric('m4','Latihan',d.jumlah_latihan+'x')+'</div>'+
          '<div class="grid-2">'+
            '<div class="info-card"><div class="info-card-title">Progres Level</div>'+
              '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span>Level '+d.level+'</span><span>'+(d.xp_next?'menuju Lv '+(d.level+1):'maksimal')+'</span></div>'+
              '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
              '<div style="margin-top:16px"><button class="btn btn-primary" onclick="navigate(\'latihan\')">Mulai Latihan вҶ’</button></div></div>'+
            '<div class="info-card"><div class="info-card-title">Pengumuman</div>'+pengList(peng,2)+'</div>'+
          '</div>'
        );
      }).catch(errMain);
    } else if(u.role==='guru'){
      Promise.all([callServer('getGuruDashboard',STATE.token), callServer('getDashboardMapel',STATE.token)]).then(function(r){
        var d=r[0]; DASH_MAPEL=r[1]||[];
        var html=head('Dashboard Guru','Selamat datang, '+esc(u.nama)+'.');
        html+='<div class="metrics">'+

  function distChart(dist){
    var labels=['<50','50-59','60-69','70-79','80-89','90-100'];
    var max=Math.max.apply(null,dist.concat([1]));
    return '<div style="display:flex;align-items:flex-end;gap:8px;height:120px">'+dist.map(function(v,i){
      var h=Math.round(v/max*100);
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px"><div style="font-size:11px;color:var(--muted)">'+v+'</div><div style="width:100%;background:linear-gradient(180deg,#A855F7,#EC4899);border-radius:6px 6px 0 0;height:'+h+'px;min-height:3px"></div><div style="font-size:10px;color:var(--soft)">'+labels[i]+'</div></div>';
    }).join('')+'</div>';
  }

  /* ===================== MATERI ===================== */
  var MATERI_CACHE=[], MATERI_GROUPS=[];
  function renderMateri(){
    loadingMain();
    var isGuru=STATE.user.role!=='siswa';
    callServer('listMateri',STATE.token).then(function(list){
      MATERI_CACHE=list;
      var btn=isGuru?'<button class="btn btn-primary" onclick="openUploadMateri()">+ Upload Materi</button>':'';
      var html=headFlex('Materi Pembelajaran',isGuru?'Upload & kelola materi (dikelompokkan per mapel)':'Pilih mata pelajaran untuk melihat materinya',btn);
      if(!list.length){ html+='<div class="empty">Belum ada materi.'+(isGuru?' Klik "Upload Materi" untuk menambah.':'')+'</div>'; setMain(html); return; }
      var groups={};
      list.forEach(function(m){ var k=m.mapel||'Lainnya'; if(!groups[k]) groups[k]={count:0,belum:0}; groups[k].count++; if(STATE.user.role==='siswa'&&!m.sudah_dibaca) groups[k].belum++; });
      MATERI_GROUPS=Object.keys(groups);
      var colors=['m1','m2','m3','m4'];
      html+='<div class="metrics">'+MATERI_GROUPS.map(function(k,i){

        var sub=STATE.user.role==='siswa'?(g.belum?g.belum+' belum dibaca':'semua dibaca'):g.count+' materi';
        return '<div class="metric '+colors[i%4]+'" style="cursor:pointer" onclick="renderMateriByMapel('+i+')"><div class="metric-label">'+esc(k)+'</div><div class="metric-val">'+g.count+'</div><div style="font-size:11px;opacity:.85;margin-top:4px">'+sub+'</div></div>';
      }).join('')+'</div>';
      setMain(html);
      if(MATERI_FOCUS){ var mf=MATERI_FOCUS; MATERI_FOCUS=null; var mi=MATERI_GROUPS.indexOf(mf.mapel); if(mi>=0){ renderMateriByMapel(mi); if(mf.q){ var ss=document.getElementById('mat-search'); if(ss){ ss.value=mf.q; filterMateriGroups(); } } } }
    }).catch(errMain);

  function semLabel(s){ s=String(s||'').trim(); return s?('Semester '+s.replace(/^semester\s*/i,'')):'Tanpa Semester'; }
  function semOrder(s){ var t=String(s||'').toLowerCase(); if(t.indexOf('ganjil')!==-1||t==='1'||t.indexOf('1')!==-1) return 1; if(t.indexOf('genap')!==-1||t==='2'||t.indexOf('2')!==-1) return 2; return 9; }
  function kelasOrderKey(k){ if(k==='Semua kelas') return -1; var m=String(k).match(/(\d+)/); return m?parseInt(m[1],10):9998; }
  function judulNoKey(t){ var m=String(t||'').match(/\d+/); return m?parseInt(m[0],10):999999; }
  var MATERI_CUR=[], MATERI_CUR_MAPEL='';
  function renderMateriByMapel(idx){
    var mapel=MATERI_GROUPS[idx]; var isGuru=STATE.user.role!=='siswa';
    MATERI_CUR_MAPEL=mapel;
    MATERI_CUR=MATERI_CACHE.filter(function(m){ return (m.mapel||'Lainnya')===mapel; });
    var btn=isGuru?'<button class="btn btn-primary" onclick="openUploadMateri()">+ Upload</button>':'';
    var html=headFlex('Materi В· '+esc(mapel), MATERI_CUR.length+' materi', btn);
    html+='<button class="btn btn-sm" style="margin-bottom:12px" onclick="renderMateri()">вҶҗ Semua Mapel</button>';
    html+='<input class="input" id="mat-search" placeholder="рҹ”Қ Cari judul, kelas, atau semester..." oninput="filterMateriGroups()" style="margin-bottom:8px">';
    html+='<div style="font-size:11px;color:var(--soft);margin-bottom:10px">Klik kelas/semester untuk membuka. Ketik untuk mencari cepat.</div>';
    html+='<div id="mat-groups"></div>';

    renderMateriGroups('');

  function toggleMat(bodyId, caretId){
    var b=document.getElementById(bodyId); if(!b) return;
    var open=b.style.display!=='none';
    b.style.display=open?'none':'';
    var c=document.getElementById(caretId); if(c) c.textContent=open?'в–ё':'в–ҫ';
  }
  function filterMateriGroups(){ renderMateriGroups(((document.getElementById('mat-search')||{}).value||'').toLowerCase().trim()); }
  function renderMateriGroups(q){
    var box=document.getElementById('mat-groups'); if(!box) return;
    var isGuru=STATE.user.role!=='siswa';
    var list=MATERI_CUR.filter(function(m){
      if(!q) return true;
      var hay=(String(m.judul||'')+' '+String(m.kelas||'')+' '+String(m.semester||'')+' '+String(m.mapel||'')).toLowerCase();
      return hay.indexOf(q)!==-1;
    });
    if(!list.length){ box.innerHTML='<div class="empty">Tidak ada materi yang cocok'+(q?' dengan "'+esc(q)+'"':'')+'.</div>'; return; }
    var open=!!q; // saat mencari, otomatis buka; default tertutup
    var byKelas={};
    list.forEach(function(m){
      var kelasList=(m.kelas&&String(m.kelas).trim())?String(m.kelas).split(',').map(function(s){return s.trim();}).filter(function(s){return s;}):['Semua kelas'];
      kelasList.forEach(function(k){ if(!byKelas[k])byKelas[k]={}; var sk=semLabel(m.semester); if(!byKelas[k][sk])byKelas[k][sk]=[]; byKelas[k][sk].push(m); });
    });
    var kelasKeys=Object.keys(byKelas).sort(function(a,b){ return kelasOrderKey(a)-kelasOrderKey(b) || a.localeCompare(b); });
    var out='';
    kelasKeys.forEach(function(k,ki){
      var totalK=Object.keys(byKelas[k]).reduce(function(a,s){return a+byKelas[k][s].length;},0);
      var kbody='mg-k'+ki, kcar='cg-k'+ki;
      out+='<div onclick="toggleMat(\''+kbody+'\',\''+kcar+'\')" style="cursor:pointer;display:flex;align-items:center;gap:8px;margin:6px 0;padding:9px 10px;background:#FAF7FF;border-radius:10px;user-select:none"><span id="'+kcar+'" style="font-size:12px;color:var(--muted)">'+(open?'в–ҫ':'в–ё')+'</span><span style="font-size:14px;font-weight:700;flex:1">'+(k==='Semua kelas'?'рҹ“ҡ Semua Kelas':'рҹҺ“ Kelas '+esc(k))+'</span><span class="badge b-purple">'+totalK+' materi</span></div>';
      out+='<div id="'+kbody+'" style="display:'+(open?'':'none')+';padding-left:6px">';
      var semKeys=Object.keys(byKelas[k]).sort(function(a,b){ return semOrder(a)-semOrder(b) || a.localeCompare(b); });
      semKeys.forEach(function(sk,si){
        var sbody='mg-k'+ki+'s'+si, scar='cs-k'+ki+'s'+si;
        out+='<div onclick="toggleMat(\''+sbody+'\',\''+scar+'\')" style="cursor:pointer;display:flex;align-items:center;gap:7px;margin:6px 0 4px;user-select:none"><span id="'+scar+'" style="font-size:11px;color:var(--soft)">'+(open?'в–ҫ':'в–ё')+'</span><span style="font-size:12px;font-weight:600;color:var(--soft);text-transform:uppercase;letter-spacing:.4px">'+esc(sk)+'</span><span class="badge b-gray">'+byKelas[k][sk].length+'</span></div>';
        out+='<div id="'+sbody+'" style="display:'+(open?'':'none')+'">'+byKelas[k][sk].slice().sort(function(a,b){ return judulNoKey(a.judul)-judulNoKey(b.judul) || String(a.judul).localeCompare(String(b.judul)); }).map(function(m){ return materiItemHtml(m,isGuru); }).join('')+'</div>';
      });
      out+='</div>';
    });
    box.innerHTML=out;
  }

  function submitUploadMateri(){
    var judul=document.getElementById('mt-judul').value.trim();
    var fileEl=document.getElementById('mt-file'); var al=document.getElementById('mt-alert'); al.classList.remove('show');
    if(!judul){ al.textContent='Judul wajib diisi.'; al.classList.add('show'); return; }
    if(!fileEl.files.length){ al.textContent='Pilih file terlebih dahulu.'; al.classList.add('show'); return; }
    var file=fileEl.files[0];
    if(file.size>25*1024*1024){ al.textContent='Ukuran maksimal 25 MB.'; al.classList.add('show'); return; }
    var btn=document.getElementById('mt-submit'); btn.disabled=true; btn.textContent='Mengunggah...';
    var reader=new FileReader();
    reader.onload=function(){
      callServer('uploadMateri',STATE.token,{ judul:judul, mapel:getMapelValue(), semester:document.getElementById('mt-semester').value, kelas:getMateriKelasValue(), deskripsi:document.getElementById('mt-desk').value.trim(), fileName:file.name, mimeType:file.type, base64data:reader.result.split(',')[1] })
        .then(function(res){ if(res.success){ closeModal(); renderMateri(); toast('Materi diunggah'); } else { al.textContent=res.message; al.classList.add('show'); btn.disabled=false; btn.textContent='Upload'; } })
        .catch(function(e){ al.textContent='Kesalahan: '+e.message; al.classList.add('show'); btn.disabled=false; btn.textContent='Upload'; });
    };
    reader.readAsDataURL(file);
  }

  function filterPaketGroups(){ renderPaketGroups(((document.getElementById('pkt-search')||{}).value||'').toLowerCase().trim()); }
  function renderPaketGroups(q){
    var box=document.getElementById('pkt-groups'); if(!box) return;
    var list=PAKET_CUR.filter(function(p){
      if(!q) return true;
      var hay=(String(p.nama||'')+' '+String(p.kelas||'')+' '+String(p.semester||'')+' '+String(p.mapel||'')).toLowerCase();
      return hay.indexOf(q)!==-1;
    });
    if(!list.length){ box.innerHTML='<div class="empty">Tidak ada paket yang cocok'+(q?' dengan "'+esc(q)+'"':'')+'.</div>'; return; }
    var open=!!q;
    var byKelas={};
    list.forEach(function(p){
      var kelasList=(p.kelas&&String(p.kelas).trim())?String(p.kelas).split(',').map(function(s){return s.trim();}).filter(function(s){return s;}):['Semua kelas'];
      kelasList.forEach(function(k){ if(!byKelas[k])byKelas[k]={}; var sk=semLabel(p.semester); if(!byKelas[k][sk])byKelas[k][sk]=[]; byKelas[k][sk].push(p); });
    });
    var kelasKeys=Object.keys(byKelas).sort(function(a,b){ return kelasOrderKey(a)-kelasOrderKey(b) || a.localeCompare(b); });
    var out='';
    kelasKeys.forEach(function(k,ki){
      var totalK=Object.keys(byKelas[k]).reduce(function(a,s){return a+byKelas[k][s].length;},0);
      var kbody='pg-k'+ki, kcar='pgc-k'+ki;
      out+='<div onclick="toggleMat(\''+kbody+'\',\''+kcar+'\')" style="cursor:pointer;display:flex;align-items:center;gap:8px;margin:6px 0;padding:9px 10px;background:#FAF7FF;border-radius:10px;user-select:none"><span id="'+kcar+'" style="font-size:12px;color:var(--muted)">'+(open?'в–ҫ':'в–ё')+'</span><span style="font-size:14px;font-weight:700;flex:1">'+(k==='Semua kelas'?'рҹ“ҡ Semua Kelas':'рҹҺ“ Kelas '+esc(k))+'</span><span class="badge b-purple">'+totalK+' paket</span></div>';
      out+='<div id="'+kbody+'" style="display:'+(open?'':'none')+';padding-left:6px">';
      var semKeys=Object.keys(byKelas[k]).sort(function(a,b){ return semOrder(a)-semOrder(b) || a.localeCompare(b); });
      semKeys.forEach(function(sk,si){
        var sbody='pg-k'+ki+'s'+si, scar='pgc-k'+ki+'s'+si;
        out+='<div onclick="toggleMat(\''+sbody+'\',\''+scar+'\')" style="cursor:pointer;display:flex;align-items:center;gap:7px;margin:6px 0 4px;user-select:none"><span id="'+scar+'" style="font-size:11px;color:var(--soft)">'+(open?'в–ҫ':'в–ё')+'</span><span style="font-size:12px;font-weight:600;color:var(--soft);text-transform:uppercase;letter-spacing:.4px">'+esc(sk)+'</span><span class="badge b-gray">'+byKelas[k][sk].length+'</span></div>';
        out+='<div id="'+sbody+'" style="display:'+(open?'':'none')+'">'+byKelas[k][sk].map(function(p){ return paketItemHtml(p); }).join('')+'</div>';
      });
      out+='</div>';
    });
    box.innerHTML=out;
  }

  function parseBarisCSV(line, delim){
    var out=[], cur='', q=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(q){ if(c==='"'){ if(line[i+1]==='"'){ cur+='"'; i++; } else q=false; } else cur+=c; }
      else { if(c==='"') q=true; else if(c===delim){ out.push(cur); cur=''; } else cur+=c; }
    }
    out.push(cur); return out;
  }
  function parseSoalCSV(raw){
    raw=String(raw||'').replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim();
    var soal=[], errors=[];
    if(!raw) return { soal:soal, errors:errors };
    var delim = raw.indexOf('\t')!==-1 ? '\t' : ',';
    var lines=raw.split('\n').filter(function(l){ return l.trim()!==''; });
    if(lines.length && /pertanyaan|soal/i.test(lines[0].split(delim)[0])) lines.shift();
    lines.forEach(function(line, idx){
      var c=parseBarisCSV(line, delim).map(function(x){ return (x||'').trim(); });
      var q=c[0], a=c[1], b=c[2], cc=c[3], d=c[4], kunci=(c[5]||'').toUpperCase(), skor=Number(c[6])||10;
      var rowErr=[];
      if(!q) rowErr.push('pertanyaan kosong');
      if(!a||!b||!cc||!d) rowErr.push('pilihan AвҖ“D belum lengkap');
      if(['A','B','C','D'].indexOf(kunci)===-1) rowErr.push('kunci harus A/B/C/D');
      if(rowErr.length) errors.push('Baris '+(idx+1)+': '+rowErr.join(', '));
      else soal.push({ pertanyaan:q, a:a, b:b, c:cc, d:d, kunci:kunci, skor:skor });
    });
    return { soal:soal, errors:errors };
  }

        html+='<div class="info-card" style="border-left:3px solid #EF4444"><div class="info-card-title">Rekomendasi Intervensi</div>';
        if(r.perlu_bantuan_mapel&&r.perlu_bantuan_mapel.length) html+='<div style="font-size:13px;margin-bottom:8px">Mapel yang perlu bantuan: '+r.perlu_bantuan_mapel.map(function(m){return '<span class="badge b-red" style="margin:2px">'+esc(m)+'</span>';}).join(' ')+'</div>';
        if(r.saran_paket) html+='<div style="font-size:13px;color:var(--muted)">Paket terlemah: <b>'+esc(r.saran_paket.paket_nama)+'</b> (rata-rata '+r.saran_paket.rata+'). Beri PR remedial untuk memperkuat.</div>';
        html+='<div style="margin-top:12px"><button class="btn btn-primary btn-sm" onclick="openPRRemedial()">+ Buat PR Remedial</button></div></div>';
      } else {
        html+='<div class="info-card" style="border-left:3px solid #22C55E"><div style="font-size:13px;color:var(--muted)">Performa siswa ini tergolong baik. Tetap pantau perkembangannya.</div><div style="margin-top:10px"><button class="btn btn-sm" onclick="openPRRemedial()">+ Buat PR Khusus</button></div></div>';
      }

      // Penguasaan per mapel
      html+='<div class="grid-2"><div class="info-card"><div class="info-card-title">Penguasaan per Mapel</div>';
      if(!d.per_mapel.length) html+='<div class="empty">Belum ada pengerjaan.</div>';
      else d.per_mapel.forEach(function(m){ var col=m.rata>=75?'#22C55E':m.rata>=60?'#F59E0B':'#EF4444'; html+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:600">'+esc(m.mapel)+' '+tierBadge(m.tier)+'</span><span>'+m.rata+' В· '+m.jumlah+'x</span></div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(6,m.rata)+'%;background:'+col+'"></div></div></div>'; });
      html+='</div>';

      // Tren skor
      html+='<div class="info-card"><div class="info-card-title">Tren Skor (terbaru)</div>';
      if(!d.trend.length) html+='<div class="empty">Belum ada.</div>';
      else {
        var max=100; html+='<div style="display:flex;align-items:flex-end;gap:6px;height:120px">'+d.trend.map(function(t){ var h=Math.round(t.skor/max*100); var col=t.skor>=75?'#22C55E':t.skor>=60?'#F59E0B':'#EF4444'; return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px" title="'+esc(t.label)+': '+t.skor+'"><div style="font-size:10px;color:var(--muted)">'+t.skor+'</div><div style="width:100%;background:'+col+';border-radius:5px 5px 0 0;height:'+Math.max(4,h)+'px"></div></div>'; }).join('')+'</div>';
      }
      html+='</div></div>';

      // Paket terlemah
      html+='<div class="info-card"><div class="info-card-title">Performa per Paket (terlemah dulu)</div>';
      if(!d.per_paket.length) html+='<div class="empty">Belum ada.</div>';
      else d.per_paket.forEach(function(p){ var col=p.rata>=75?'#22C55E':p.rata>=60?'#F59E0B':'#EF4444'; html+='<div class="bar-row"><div class="bar-label" style="width:auto;flex:1;font-size:12px">'+esc(p.paket_nama)+(p.mapel?' <span style="color:var(--soft)">В· '+esc(p.mapel)+'</span>':'')+'</div><div class="bar-track" style="width:120px;flex:none"><div class="bar-fill" style="width:'+Math.max(8,p.rata)+'%;background:'+col+'">'+p.rata+'</div></div></div>'; });
      html+='</div>';

      var seringSalah=d.sering_salah||[];
      html+='<div class="info-card"><div class="info-card-title">Soal yang Sering Dijawab Salah</div>';
      if(!seringSalah.length) html+='<div class="empty">Belum ada soal yang tercatat salah (dari Latihan/Ujian maupun PR). Data terisi otomatis setiap kali siswa mengerjakan dan ada jawaban yang keliru.</div>';
      else seringSalah.forEach(function(q){ html+='<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--line2)"><span class="badge b-red" style="flex-shrink:0">'+q.salah+'/'+q.total+' salah</span><div style="font-size:13px">'+esc(q.q)+'</div></div>'; });
      html+='</div>';
      setMain(html);
    }).catch(errMain);
  }
  function openPRRemedial(){
    var d=SISWA_DETAIL; if(!d){ toast('Buka detail siswa dulu','warn'); return; }
    callServer('listPaket',STATE.token).then(function(paket){
      if(!paket.length){ toast('Buat paket soal dulu di menu Soal & Ujian','warn'); return; }
      var saran=d.rekomendasi&&d.rekomendasi.saran_paket?d.rekomendasi.saran_paket.paket_id:'';
      var paketOpts=paket.map(function(p){ return '<option value="'+p.id+'"'+(String(p.id)===String(saran)?' selected':'')+'>'+esc(p.nama)+' ('+p.jumlah_soal+' soal)</option>'; }).join('');
      var judulDefault='Remedial: '+(d.rekomendasi&&d.rekomendasi.saran_paket?d.rekomendasi.saran_paket.paket_nama:d.nama);
      showModal(
        '<div style="font-weight:600;margin-bottom:4px">Buat PR Remedial</div>'+
        '<div style="font-size:12px;color:var(--soft);margin-bottom:16px">PR ini hanya ditujukan untuk <b>'+esc(d.nama)+'</b> ('+esc(d.kelas||'tanpa kelas')+').</div>'+
        '<div class="form-group"><label class="label">Judul</label><input class="input" id="rm-judul" value="'+esc(judulDefault)+'"></div>'+
        '<div class="form-group"><label class="label">Paket Soal</label><select class="input" id="rm-paket">'+paketOpts+'</select></div>'+
        '<div class="grid-2"><div class="form-group"><label class="label">Deadline</label><input class="input" type="datetime-local" id="rm-deadline"></div><div class="form-group"><label class="label">KKM (%)</label><input class="input" type="number" id="rm-kkm" value="75"></div></div>'+

        '<div id="rm-alert" class="alert"></div>'+
        '<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="submitPRRemedial()">Buat PR</button></div>'
      );

  function submitPRRemedial(){
    var d=SISWA_DETAIL; if(!d) return;
    var al=document.getElementById('rm-alert'); al.classList.remove('show');
    var data={ judul:document.getElementById('rm-judul').value.trim(), paket_id:document.getElementById('rm-paket').value, kelas:d.kelas, deadline:document.getElementById('rm-deadline').value, kkm:Number(document.getElementById('rm-kkm').value)||75, instruksi:document.getElementById('rm-instruksi').value.trim(), allow_retry:document.getElementById('rm-retry').checked, target_siswa:[d.id] };

    if(!data.paket_id){ al.textContent='Pilih paket soal.'; al.classList.add('show'); return; }
    callServer('buatPR',STATE.token,data).then(function(res){ if(res.success){ closeModal(); toast('PR remedial dibuat untuk '+d.nama); } else { al.textContent=res.message; al.classList.add('show'); } }).catch(function(e){ al.textContent='Kesalahan: '+e.message; al.classList.add('show'); });

  /* ===================== LATIHAN (siswa) ===================== */
  var QUIZ=null;
  function renderLatihan(){
    loadingMain();
    Promise.all([callServer('listPaket',STATE.token), callServer('getLatihanStats',STATE.token)]).then(function(r){
      var list=r[0]||[], stats=r[1]||{};
      var html=head('Latihan Soal','Pilih paket untuk mengukur pemahamanmu');
      if(!list.length){ html+='<div class="empty">Belum ada latihan untuk kelasmu.</div>'; setMain(html); return; }
      html+=list.map(function(p){
        var meta=(p.waktu_menit>0?' В· вҸұ '+p.waktu_menit+' mnt':'')+(p.acak?' В· рҹ”Җ acak':'');
        var st=stats[p.id];
        var statLine = st
          ? '<div style="font-size:11px;color:var(--soft);margin-top:4px">рҹ”Ғ '+st.kali+'x dikerjakan В· вҸұ rata '+(st.rata_waktu?formatDurasi(st.rata_waktu):'вҖ”')+' В· рҹҸҶ tertinggi '+st.skor_tertinggi+'</div>'
          : '<div style="font-size:11px;color:var(--soft);margin-top:4px">Belum pernah dikerjakan</div>';
        return '<div class="material-item" id="lat-'+p.id+'"><div class="mat-icon mat-doc">'+p.jumlah_soal+'</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">'+esc(p.nama)+'</div><div style="font-size:12px;color:var(--muted);margin-top:2px">'+esc(p.mapel||'-')+' В· '+p.jumlah_soal+' soal'+meta+'</div>'+statLine+'</div><button class="btn btn-primary btn-sm" onclick="startLatihan(\''+p.id+'\',\''+esc(p.nama)+'\','+(p.acak?1:0)+','+(p.waktu_menit||0)+')">Kerjakan вҶ’</button></div>';
      }).join('');

      if(LATIHAN_FOCUS){ var lf=LATIHAN_FOCUS; LATIHAN_FOCUS=null; var lid=lf.id; if(!lid&&lf.q){ var lh=list.filter(function(p){return String(p.nama).trim()===lf.q.trim();})[0]; if(lh) lid=lh.id; } if(lid) focusCard('lat-'+lid); }
    }).catch(errMain);
  }
  var QUIZ_TIMER=null;
  function shuffleArr(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function buildQuizOpts(q, acak){
    var base=[{orig:'A',text:q.a},{orig:'B',text:q.b},{orig:'C',text:q.c},{orig:'D',text:q.d}];
    if(acak) base=shuffleArr(base);
    return base.map(function(o,i){ return { label:['A','B','C','D'][i], orig:o.orig, text:o.text }; });
  }
  function startLatihan(paketId,nama,acak,waktuMenit){
    loadingMain(); acak=!!(acak&&acak!=='0'); waktuMenit=Number(waktuMenit)||0;
    callServer('getSoalByPaket',STATE.token,paketId).then(function(soal){
      soal = soal || [];
      if(!soal.length){ setMain('<div class="empty">Paket ini belum punya soal.</div>'); return; }
      if(acak) soal=shuffleArr(soal);
      soal.forEach(function(q){ q._opts=buildQuizOpts(q, acak); });
      QUIZ={ paketId:paketId, nama:nama, soal:soal, idx:0, answers:{}, startTime:Date.now(), deadline:(waktuMenit>0?Date.now()+waktuMenit*60000:0), _done:false };
      startQuizTimer(); renderQuizQuestion();
    }).catch(errMain);
  }
  function startQuizTimer(){ stopQuizTimer(); if(QUIZ&&QUIZ.deadline) QUIZ_TIMER=setInterval(tickQuizTimer,1000); }
  function stopQuizTimer(){ if(QUIZ_TIMER){ clearInterval(QUIZ_TIMER); QUIZ_TIMER=null; } }
  function tickQuizTimer(){
    if(!QUIZ||!QUIZ.deadline){ stopQuizTimer(); return; }
    var sisa=Math.round((QUIZ.deadline-Date.now())/1000);
    var el=document.getElementById('quiz-timer');
    if(sisa<=0){ stopQuizTimer(); if(el){ el.textContent='вҸұ Waktu habis'; } toast('Waktu habis вҖ” jawaban dikumpulkan otomatis'); doSubmitQuiz(); return; }
    if(el){ el.textContent='вҸұ '+formatDurasi(sisa); el.style.color=(sisa<=30?'#B91C1C':''); }
  }
  function renderQuizQuestion(){
    var q=QUIZ.soal[QUIZ.idx], total=QUIZ.soal.length, sel=QUIZ.answers[q.id], pct=Math.round(QUIZ.idx/total*100);
    var opts=(q._opts||buildQuizOpts(q,false)).map(function(o){ return '<div class="quiz-option'+(sel===o.orig?' selected':'')+'" onclick="answerQuiz(\''+o.orig+'\')">'+o.label+'. '+esc(o.text)+'</div>'; }).join('');
    var timerBar = QUIZ.deadline ? '<div style="text-align:right;margin-bottom:8px"><span id="quiz-timer" style="font-weight:700;font-size:13px">вҸұ '+formatDurasi(Math.max(0,Math.round((QUIZ.deadline-Date.now())/1000)))+'</span></div>' : '';
    var nav='<div style="display:flex;justify-content:space-between;margin-top:18px">'+(QUIZ.idx>0?'<button class="btn" onclick="quizMove(-1)">вҶҗ Sebelumnya</button>':'<span></span>')+(QUIZ.idx<total-1?'<button class="btn btn-primary" onclick="quizMove(1)">Berikutnya вҶ’</button>':'<button class="btn btn-primary" onclick="submitQuiz()">Selesai & Kumpulkan</button>')+'</div>';
    setMain('<div class="page-title">'+esc(QUIZ.nama)+'</div><div class="page-sub">Soal '+(QUIZ.idx+1)+' dari '+total+'</div>'+timerBar+'<div class="info-card"><div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:'+pct+'%"></div></div><div style="font-size:15px;font-weight:600;margin-bottom:20px;line-height:1.6">'+esc(q.pertanyaan)+'</div>'+opts+nav+'</div><div style="margin-top:12px"><button class="btn btn-sm" onclick="batalLatihan()">Batalkan</button></div>');
  }
  function answerQuiz(L){ QUIZ.answers[QUIZ.soal[QUIZ.idx].id]=L; renderQuizQuestion(); }
  function quizMove(d){ QUIZ.idx+=d; renderQuizQuestion(); }
  function batalLatihan(){ confirmDialog({ title:'Batalkan Latihan', message:'Jawaban yang sudah diisi tidak akan tersimpan. Keluar dari latihan?', okLabel:'Keluar', danger:true, onOk:function(){ stopQuizTimer(); renderLatihan(); } }); }
  function submitQuiz(){
    var answered=Object.keys(QUIZ.answers).length;
    if(answered<QUIZ.soal.length){
      confirmDialog({ title:'Kumpulkan Sekarang?', message:'Masih ada '+(QUIZ.soal.length-answered)+' soal yang belum dijawab. Tetap kumpulkan?', okLabel:'Kumpulkan', onOk:doSubmitQuiz });
      return;
    }
    doSubmitQuiz();
  }
  function doSubmitQuiz(){
    if(QUIZ&&QUIZ._done) return; if(QUIZ) QUIZ._done=true;
    stopQuizTimer();
    loadingMain();
    var durasi=QUIZ.startTime?Math.round((Date.now()-QUIZ.startTime)/1000):0;
    var arr=QUIZ.soal.map(function(s){ return { soal_id:s.id, jawaban:QUIZ.answers[s.id]||'' }; });
    callServer('submitUjian',STATE.token,QUIZ.paketId,arr,durasi).then(function(res){
      if(!res.success){ setMain('<div class="empty">'+esc(res.message)+'</div>'); return; }
      STATE.user.xp=res.xp_total; STATE.user.level=res.level; renderQuizResult(res);
    }).catch(errMain);
  }
  function formatDurasi(sec){ sec=Math.max(0,Math.round(sec||0)); var m=Math.floor(sec/60), s=sec%60; return m>0?(m+' mnt '+(s<10?'0':'')+s+' dtk'):(s+' dtk'); }
  function renderQuizResult(res){
    var badges=res.new_badges.length?'<div class="info-card"><div class="info-card-title">рҹҺү Badge Baru!</div>'+res.new_badges.map(function(b){return '<div class="badge-item"><div class="badge-circle">'+b.icon+'</div><div><div style="font-size:13px;font-weight:600">'+esc(b.nama)+'</div><div style="font-size:11px;color:var(--muted)">'+esc(b.desc)+'</div></div></div>';}).join('')+'</div>':'';
    var review='<div class="info-card"><div class="info-card-title">Pembahasan</div>'+res.review.map(function(r){
      var head='<div style="font-size:13px;font-weight:600;margin-bottom:6px">'+r.nomor+'. '+esc(r.pertanyaan)+'</div>';
      var jwbTxt = r.jawaban_siswa ? (r.jawaban_siswa+'. '+esc(r.teks_jawaban||'')) : '(tidak dijawab)';
      var line1='<div style="font-size:12px;color:'+(r.benar?'#15803D':'#B91C1C')+'">'+(r.benar?'вң“':'вң—')+' Jawabanmu: '+jwbTxt+'</div>';
      var line2 = r.benar ? '' : '<div style="font-size:12px;color:#15803D;margin-top:3px">вң“ Kunci benar: '+r.kunci+'. '+esc(r.teks_kunci||'')+'</div>';
      return '<div style="padding:10px 0;border-bottom:0.5px solid var(--line2)">'+head+line1+line2+'</div>';
    }).join('')+'</div>';
    var waktu=res.durasi?' <span class="badge b-amber">вҸұ '+formatDurasi(res.durasi)+'</span>':'';
    setMain(head('Hasil Latihan',esc(QUIZ.nama))+'<div class="info-card" style="text-align:center"><div class="score-ring"><div style="font-size:28px;font-weight:700">'+res.skor+'</div><div style="font-size:10px;opacity:.9">skor</div></div><div style="font-weight:600;margin-bottom:6px">'+res.benar+' dari '+res.total+' benar</div><div><span class="badge b-purple">+'+res.xp_earned+' XP</span> '+(res.naik_level?'<span class="badge b-pink">Naik ke Level '+res.level+'! рҹҺҠ</span>':'')+waktu+'</div></div>'+badges+review+'<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-primary" onclick="navigate(\'latihan\')">Latihan Lagi</button><button class="btn" onclick="navigate(\'nilai\')">Nilai & Badge</button></div>');
  }

  function badgeList(badges){

      var sub=e?esc(b.desc):('<span style="color:#B45309">Syarat: '+esc(b.syarat)+'</span>');

    }).join('');
  }

  /* ===================== ANALITIK (guru/admin) ===================== */
  var ANL_SISWA=[], ANL_RANK=[];
  function renderAnalitik(){
    loadingMain();
    Promise.all([callServer('getAnalitik',STATE.token), callServer('getDataSiswa',STATE.token), callServer('getRankingWaktu',STATE.token)]).then(function(r){
      var d=r[0]; ANL_SISWA=r[1]||[]; ANL_RANK=r[2]||[];
      var html=head('Analitik','Ringkasan performa siswa & aktivitas');
      // Rata-rata per kelas
      var perKelas=d.perKelas.length?d.perKelas.map(function(k){ return '<div class="bar-row"><div class="bar-label">'+esc(k.kelas)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(8,Math.round(k.avg/100*100))+'%">'+k.avg+'</div></div></div>'; }).join(''):'<div class="empty">Belum ada data.</div>';
      // Tren 7 hari
      var maxTren=Math.max.apply(null,d.tren.map(function(t){return t.jumlah;}).concat([1]));
      var tren='<div style="display:flex;align-items:flex-end;gap:8px;height:110px">'+d.tren.map(function(t){ var h=Math.round(t.jumlah/maxTren*100); return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="font-size:11px;color:var(--muted)">'+t.jumlah+'</div><div style="width:100%;background:linear-gradient(180deg,#A855F7,#EC4899);border-radius:5px 5px 0 0;height:'+h+'px;min-height:3px"></div><div style="font-size:10px;color:var(--soft)">'+t.label+'</div></div>'; }).join('')+'</div>';
      // Top siswa
      var top=d.topSiswa.length?d.topSiswa.map(function(s,i){ return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--line2)"><div style="width:24px;font-weight:700;color:var(--muted)">'+(i+1)+'</div><div class="avatar" style="width:30px;height:30px;font-size:11px">'+initials(s.nama)+'</div><div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc(s.nama)+'</div><div style="font-size:11px;color:var(--muted)">'+esc(s.kelas||'-')+' В· Lv '+s.level+'</div></div><span class="badge b-purple">'+Number(s.xp).toLocaleString('id-ID')+' XP</span></div>'; }).join(''):'<div class="empty">Belum ada data.</div>';

      // Cari & analisa per siswa
      var kelasSet={}; ANL_SISWA.forEach(function(s){ if(s.kelas) kelasSet[s.kelas]=true; });
      var kelasOpts='<option value="">Semua kelas</option>'+Object.keys(kelasSet).sort().map(function(k){ return '<option value="'+esc(k)+'">'+esc(k)+'</option>'; }).join('');
      var cariCard='<div class="info-card"><div class="info-card-title">Analisa per Siswa</div>'+
        '<div class="grid-2" style="margin-bottom:10px"><select class="input" id="anl-kelas" onchange="filterAnalitikSiswa()">'+kelasOpts+'</select><input class="input" id="anl-cari" placeholder="рҹ”Қ Cari nama siswa..." oninput="filterAnalitikSiswa()"></div>'+
        '<div id="anl-siswa-list"></div>'+
        '<div style="font-size:11px;color:var(--soft);margin-top:6px">Klik siswa untuk melihat performa lengkap: mapel unggulan & terlemah, tren, dan butir soal.</div></div>';

      // Ranking kecepatan per mapel
      var rankCard='<div class="info-card"><div class="info-card-title">рҹҸҒ Ranking Kecepatan Pengerjaan per Mapel</div>';
      if(!ANL_RANK.length) rankCard+='<div class="empty">Belum ada catatan waktu. Ranking muncul setelah siswa mengerjakan latihan (dengan pencatatan durasi).</div>';
      else {
        rankCard+='<select class="input" id="anl-rankmapel" onchange="renderRankingWaktu()" style="margin-bottom:12px">'+ANL_RANK.map(function(x,i){ return '<option value="'+i+'">'+esc(x.mapel)+'</option>'; }).join('')+'</select><div id="anl-rank-body"></div>';
      }
      rankCard+='</div>';

      html+='<div class="grid-2"><div class="info-card"><div class="info-card-title">Rata-rata Skor per Kelas</div>'+perKelas+'</div><div class="info-card"><div class="info-card-title">Distribusi Skor</div>'+distChart(d.distribusi)+'</div></div>';
      html+='<div class="grid-2"><div class="info-card"><div class="info-card-title">Aktivitas 7 Hari Terakhir</div>'+tren+'</div><div class="info-card"><div class="info-card-title">рҹҸҶ Top 5 Siswa (XP)</div>'+top+'</div></div>';
      html+=cariCard+rankCard;
      setMain(html);
      filterAnalitikSiswa();
      if(ANL_RANK.length) renderRankingWaktu();
    }).catch(errMain);
  }
  function filterAnalitikSiswa(){
    var box=document.getElementById('anl-siswa-list'); if(!box) return;
    var kelas=(document.getElementById('anl-kelas')||{}).value||'';
    var q=((document.getElementById('anl-cari')||{}).value||'').toLowerCase().trim();
    var list=ANL_SISWA.filter(function(s){ return (!kelas||s.kelas===kelas) && (!q||String(s.nama).toLowerCase().indexOf(q)!==-1); });
    if(!list.length){ box.innerHTML='<div class="empty">Tidak ada siswa yang cocok.</div>'; return; }
    box.innerHTML='<div class="table-wrap" style="max-height:300px;overflow:auto">'+list.map(function(s){
      var col=!s.jumlah_latihan?'b-gray':s.rata_skor>=75?'b-green':s.rata_skor>=60?'b-amber':'b-red';
      var lbl=!s.jumlah_latihan?'Belum aktif':s.rata_skor>=75?'Mahir':s.rata_skor>=60?'Berkembang':'Perlu bantuan';
      return '<div onclick="analisaSiswa(\''+s.id+'\')" style="cursor:pointer;display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px" onmouseover="this.style.background=\'#FAF7FF\'" onmouseout="this.style.background=\'\'"><div class="avatar" style="width:30px;height:30px;font-size:11px">'+initials(s.nama)+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+esc(s.nama)+'</div><div style="font-size:11px;color:var(--muted)">'+esc(s.kelas||'tanpa kelas')+' В· rata '+s.rata_skor+' В· '+s.jumlah_latihan+'x</div></div><span class="badge '+col+'">'+lbl+'</span></div>';
    }).join('')+'</div>';
  }
  function renderRankingWaktu(){
    var body=document.getElementById('anl-rank-body'); if(!body) return;
    var idx=Number((document.getElementById('anl-rankmapel')||{}).value||0);
    var data=ANL_RANK[idx]; if(!data){ body.innerHTML=''; return; }
    var rows=data.ranking.map(function(r,i){
      var medal=i===0?'рҹҘҮ':i===1?'рҹҘҲ':i===2?'рҹҘү':(i+1)+'.';

      ['A','B','C','D'].map(function(L){return '<div class="opt-row"><div class="key">'+L+'</div><input class="input" data-f="'+L+'" placeholder="Pilihan '+L+'"></div>';}).join('')+
      '<div class="opt-row" style="margin-top:8px"><span style="font-size:12px;color:var(--muted)">Kunci:</span><select class="input" data-f="kunci" style="width:auto"><option>A</option><option>B</option><option>C</option><option>D</option></select><span style="font-size:12px;color:var(--muted)">Skor:</span><input class="input" data-f="skor" type="number" value="10" style="width:70px"></div>';
    wrap.appendChild(div);
  }
  function getPRBaruSoal(){
    var arr=[];
    document.querySelectorAll('#prb-list .soal-builder-item').forEach(function(item){
      var q=item.querySelector('[data-f="q"]').value.trim(); if(!q) return;
      arr.push({ pertanyaan:q, a:item.querySelector('[data-f="A"]').value.trim(), b:item.querySelector('[data-f="B"]').value.trim(), c:item.querySelector('[data-f="C"]').value.trim(), d:item.querySelector('[data-f="D"]').value.trim(), kunci:item.querySelector('[data-f="kunci"]').value, skor:Number(item.querySelector('[data-f="skor"]').value)||10 });
    });
    return arr;
  }
  function togglePRTgt(){
    var v=document.querySelector('input[name="pr-tgt"]:checked').value;
    document.getElementById('pr-tgt-box').style.display=v==='tertentu'?'':'none';
    if(v==='tertentu') filterPRTargetPicker();
  }
  function prTgtToggle(id,on){ if(on) PR_TGT_SEL[id]=true; else delete PR_TGT_SEL[id]; }
  function filterPRTargetPicker(){
    var box=document.getElementById('pr-tgt-list'); if(!box) return;
    var kelas=(document.getElementById('pr-kelas')||{}).value||'';
    var q=((document.getElementById('pr-tgt-cari')||{}).value||'').toLowerCase().trim();
    var list=PR_SISWA_ALL.filter(function(s){ return (!kelas||s.kelas===kelas) && (!q||String(s.nama).toLowerCase().indexOf(q)!==-1); });
    var count=Object.keys(PR_TGT_SEL).length;
    var head='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">'+count+' siswa dipilih</div>';
    if(!list.length){ box.innerHTML=head+'<div style="font-size:12px;color:var(--soft);padding:8px">Tidak ada siswa yang cocok.</div>'; return; }
    box.innerHTML=head+'<div style="max-height:200px;overflow:auto;border:0.5px solid var(--line);border-radius:10px;padding:4px">'+list.map(function(s){
      return '<label style="display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:13px;cursor:pointer;border-radius:8px"><input type="checkbox" class="pr-tgt-cb" value="'+s.id+'"'+(PR_TGT_SEL[s.id]?' checked':'')+' onchange="prTgtToggle(this.value,this.checked);filterPRTargetPickerCount()"> '+esc(s.nama)+' <span style="font-size:11px;color:var(--soft)">('+esc(s.kelas||'-')+')</span></label>';
    }).join('')+'</div>';
  }
  function filterPRTargetPickerCount(){ var box=document.getElementById('pr-tgt-list'); if(box){ var h=box.querySelector('div'); if(h) h.textContent=Object.keys(PR_TGT_SEL).length+' siswa dipilih'; } }
  function submitBuatPR(){
    var al=document.getElementById('pr-alert'); al.classList.remove('show');
    var judul=document.getElementById('pr-judul').value.trim();
    if(!judul){ al.textContent='Judul wajib diisi.'; al.classList.add('show'); return; }
    var tgtMode=document.querySelector('input[name="pr-tgt"]:checked').value;
    var target=(tgtMode==='tertentu')?Object.keys(PR_TGT_SEL):[];
    if(tgtMode==='tertentu' && !target.length){ al.textContent='Pilih minimal 1 siswa penerima.'; al.classList.add('show'); return; }
    var srcMode=document.querySelector('input[name="pr-src"]:checked').value;
    var kelasSel=document.getElementById('pr-kelas').value;
    var mapel=getMapelValue();
    var base={ judul:judul, mapel:mapel, kelas:(tgtMode==='tertentu'?'':kelasSel), deadline:document.getElementById('pr-deadline').value, kkm:Number(document.getElementById('pr-kkm').value)||75, instruksi:document.getElementById('pr-instruksi').value.trim(), allow_retry:document.getElementById('pr-retry').checked, target_siswa:target };
    var btn=document.getElementById('pr-save');
    function busy(on){ if(!btn)return; btn.disabled=on; btn.innerHTML=on?'<span style="display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:7px;vertical-align:-2px"></span>MenyimpanвҖҰ':'Simpan PR'; }
    function fail(msg){ al.textContent=msg; al.classList.add('show'); busy(false); }
    busy(true);
    if(srcMode==='baru'){
      var nama=document.getElementById('prb-nama').value.trim();
      var mode=document.querySelector('input[name="pr-baru-mode"]:checked').value;
      var soal = (mode==='csv') ? PR_CSV_SOAL : getPRBaruSoal();
      if(!nama){ return fail('Nama paket baru wajib diisi.'); }
      if(!soal.length){ return fail(mode==='csv'?'Belum ada soal valid dari CSV. Periksa format & preview.':'Tambahkan minimal 1 soal untuk paket baru.'); }
      callServer('createPaketSoal',STATE.token,{ nama:nama, mapel:mapel, kelas:base.kelas, soal:soal, status:'aktif' }).then(function(res){
        if(!res.success){ return fail(res.message); }
        base.paket_id=res.id; finalizePR(base,fail);
      }).catch(function(e){ fail('Kesalahan: '+e.message); });
    } else {
      base.paket_id=document.getElementById('pr-paket').value;
      if(!base.paket_id){ return fail('Pilih paket soal atau buat paket baru.'); }
      finalizePR(base,fail);
    }
  }
  function finalizePR(data,fail){
    callServer('buatPR',STATE.token,data).then(function(res){ if(res.success){ closeModal(); renderPRGuru(); toast('PR dibuat'+(data.target_siswa&&data.target_siswa.length?' untuk '+data.target_siswa.length+' siswa':'')); } else { fail(res.message); } }).catch(function(e){ fail('Kesalahan: '+e.message); });
  }
  function hapusPR(id){ confirmDialog({ title:'Hapus PR', message:'PR ini beserta data pengerjaan siswa akan dihapus. Lanjutkan?', okLabel:'Hapus', danger:true, onOk:function(){ callServer('hapusPR',STATE.token,id).then(function(){ renderPRGuru(); toast('PR dihapus'); }).catch(function(e){ toast(e.message,'err'); }); }}); }

  function lihatPRReport(id){
    loadingMain();
    callServer('getPRReport',STATE.token,id).then(function(d){
      if(!d||d.success===false){ toast(d&&d.message?d.message:'Gagal memuat laporan','err'); renderPRGuru(); return; }
      var comp=d.total_siswa?Math.round(d.sudah/d.total_siswa*100):0;
      var html=head('Laporan PR В· '+esc(d.judul), esc(d.mapel||'')+(d.kelas?' В· '+esc(d.kelas):'')+(d.deadline_label?' В· deadline '+esc(d.deadline_label):''));
      html+='<button class="btn btn-sm" style="margin-bottom:16px" onclick="renderPRGuru()">вҶҗ Daftar PR</button>';
      html+='<div class="metrics">'+metric('m1','Pengerjaan',comp+'%')+metric('m2','Sudah / Total',d.sudah+'/'+d.total_siswa)+metric('m3','Rata-rata Skor',d.rata_skor)+metric('m4','Tepat Waktu',d.tepat_waktu_pct+'%')+'</div>';
      if(d.perlu_bantuan.length) html+='<div class="info-card" style="border-left:3px solid #EF4444"><div class="info-card-title">вҡ пёҸ Perlu Perhatian (di bawah KKM '+d.kkm+'%)</div><div>'+d.perlu_bantuan.map(function(s){ return '<span class="badge b-red" style="margin:2px">'+esc(s.nama)+' В· '+s.skor+'</span>'; }).join(' ')+'</div></div>';
      if(d.item_analysis.length){
        html+='<div class="info-card"><div class="info-card-title">Analisis Butir Soal (% siswa menjawab benar)</div>';
        d.item_analysis.forEach(function(it){ var col=it.pct>=70?'#22C55E':it.pct>=40?'#F59E0B':'#EF4444'; html+='<div class="bar-row"><div class="bar-label">Soal '+it.nomor+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(6,it.pct)+'%;background:'+col+'">'+it.pct+'%</div></div></div>'; });
        html+='<div style="font-size:11px;color:var(--soft);margin-top:8px">Soal berpersentase rendah sebaiknya dibahas ulang di kelas.</div></div>';
      }
      html+='<div class="info-card" style="padding:0"><div class="info-card-title" style="padding:18px 22px 0">Daftar Siswa</div><div class="table-wrap"><table class="table"><tr><th>Nama</th><th>Status</th><th>Skor</th><th>Waktu</th><th>Percobaan</th></tr>';
      d.daftar.forEach(function(s){
        var st = s.status==='selesai' ? '<span class="badge '+(s.terlambat?'b-amber':'b-green')+'">'+(s.terlambat?'Terlambat':'Tepat waktu')+'</span>' : '<span class="badge b-gray">Belum</span>';
        html+='<tr><td style="font-weight:600">'+esc(s.nama)+'</td><td>'+st+'</td><td>'+(s.status==='selesai'?s.skor:'-')+'</td><td style="font-size:12px">'+(s.submitted_at||'-')+'</td><td>'+(s.attempt||'-')+'</td></tr>';
      });
      html+='</table></div></div>';
      setMain(html);
    }).catch(errMain);
  }

  function renderPRSiswa(){
    loadingMain();
    callServer('listPRSiswa',STATE.token).then(function(list){
      var html=head('PR / Tugas','Kerjakan tugas dari gurumu sebelum deadline');
      if(!list.length){ html+='<div class="empty">Belum ada PR untuk kelasmu. рҹҺү</div>'; setMain(html); return; }
      html+=list.map(function(p){
        var badge;
        if(p.status==='selesai') badge='<span class="badge '+(p.lulus?'b-green':'b-amber')+'">Selesai В· '+p.skor+'</span>';
        else if(p.lewat_deadline) badge='<span class="badge b-red">Lewat deadline</span>';
        else badge='<span class="badge b-amber">Belum dikerjakan</span>';
        var btn = (p.status==='selesai' && !p.allow_retry) ? '' : '<button class="btn btn-primary btn-sm" onclick="kerjakanPR(\''+p.id+'\',\''+esc(p.judul)+'\')">'+(p.status==='selesai'?'Ulangi':'Kerjakan')+' вҶ’</button>';
        return '<div class="material-item" id="pr-'+p.id+'"><div class="mat-icon mat-doc">PR</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">'+esc(p.judul)+'</div><div style="font-size:12px;color:var(--muted);margin-top:2px">'+esc(p.mapel||'-')+' В· '+p.jumlah_soal+' soal'+(p.deadline_label?' В· deadline '+esc(p.deadline_label):'')+'</div></div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end">'+badge+btn+'</div></div>';
      }).join('');
      setMain(html);
      if(PR_FOCUS){ var pf2=PR_FOCUS; PR_FOCUS=null; var pid2=pf2.id; if(!pid2&&pf2.q){ var ph2=list.filter(function(p){return String(p.judul).trim()===pf2.q.trim();})[0]; if(ph2) pid2=ph2.id; } if(pid2) focusCard('pr-'+pid2); }
    }).catch(errMain);
  }
  var PRQUIZ=null;
  function kerjakanPR(prId,judul){
    loadingMain();
    callServer('getPRUntukKerjakan',STATE.token,prId).then(function(d){
      if(!d||!d.success){ setMain('<div class="empty">'+esc(d&&d.message?d.message:'Gagal memuat PR.')+'<br><br><button class="btn" onclick="renderPRSiswa()">вҶҗ Kembali</button></div>'); return; }
      var soal=d.soal||[];
      if(!soal.length){ setMain('<div class="empty">PR ini belum punya soal.</div>'); return; }
      PRQUIZ={ prId:prId, judul:judul, instruksi:d.instruksi, soal:soal, idx:0, answers:{} };
      renderPRQuestion();
    }).catch(errMain);
  }
  function renderPRQuestion(){
    var q=PRQUIZ.soal[PRQUIZ.idx], total=PRQUIZ.soal.length, sel=PRQUIZ.answers[q.id], pct=Math.round(PRQUIZ.idx/total*100);
    var opts=['a','b','c','d'].map(function(k){ var L=k.toUpperCase(); return '<div class="quiz-option'+(sel===L?' selected':'')+'" onclick="answerPR(\''+L+'\')">'+L+'. '+esc(q[k])+'</div>'; }).join('');
    var nav='<div style="display:flex;justify-content:space-between;margin-top:18px">'+(PRQUIZ.idx>0?'<button class="btn" onclick="prMove(-1)">вҶҗ Sebelumnya</button>':'<span></span>')+(PRQUIZ.idx<total-1?'<button class="btn btn-primary" onclick="prMove(1)">Berikutnya вҶ’</button>':'<button class="btn btn-primary" onclick="submitPRNow()">Selesai & Kumpulkan</button>')+'</div>';
    var instr=(PRQUIZ.idx===0&&PRQUIZ.instruksi)?'<div class="announce-item" style="margin-bottom:14px">'+esc(PRQUIZ.instruksi)+'</div>':'';
    setMain('<div class="page-title">'+esc(PRQUIZ.judul)+'</div><div class="page-sub">Soal '+(PRQUIZ.idx+1)+' dari '+total+'</div>'+instr+'<div class="info-card"><div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:'+pct+'%"></div></div><div style="font-size:15px;font-weight:600;margin-bottom:20px;line-height:1.6">'+esc(q.pertanyaan)+'</div>'+opts+nav+'</div><div style="margin-top:12px"><button class="btn btn-sm" onclick="renderPRSiswa()">Batalkan</button></div>');
  }
  function answerPR(L){ PRQUIZ.answers[PRQUIZ.soal[PRQUIZ.idx].id]=L; renderPRQuestion(); }
  function prMove(d){ PRQUIZ.idx+=d; renderPRQuestion(); }
  function submitPRNow(){
    var answered=Object.keys(PRQUIZ.answers).length;
    if(answered<PRQUIZ.soal.length){ confirmDialog({ title:'Kumpulkan PR?', message:'Masih ada '+(PRQUIZ.soal.length-answered)+' soal belum dijawab. Tetap kumpulkan?', okLabel:'Kumpulkan', onOk:doSubmitPR }); return; }
    doSubmitPR();
  }
  function doSubmitPR(){
    loadingMain();
    var arr=PRQUIZ.soal.map(function(s){ return { soal_id:s.id, jawaban:PRQUIZ.answers[s.id]||'' }; });
    callServer('submitPR',STATE.token,PRQUIZ.prId,arr).then(function(res){
      if(!res.success){ setMain('<div class="empty">'+esc(res.message)+'</div>'); return; }
      if(res.xp_total!=null){ STATE.user.xp=res.xp_total; STATE.user.level=res.level; }
      renderPRResult(res);
    }).catch(errMain);
  }
  function renderPRResult(res){
    var lulus=res.skor>=res.kkm;
    var review='<div class="info-card"><div class="info-card-title">Pembahasan</div>'+res.review.map(function(r){ var head='<div style="font-size:13px;font-weight:600;margin-bottom:6px">'+r.nomor+'. '+esc(r.pertanyaan)+'</div>'; var jwbTxt=r.jawaban_siswa?(r.jawaban_siswa+'. '+esc(r.teks_jawaban||'')):'(tidak dijawab)'; var line1='<div style="font-size:12px;color:'+(r.benar?'#15803D':'#B91C1C')+'">'+(r.benar?'вң“':'вң—')+' Jawabanmu: '+jwbTxt+'</div>'; var line2=r.benar?'':'<div style="font-size:12px;color:#15803D;margin-top:3px">вң“ Kunci benar: '+r.kunci+'. '+esc(r.teks_kunci||'')+'</div>'; return '<div style="padding:10px 0;border-bottom:0.5px solid var(--line2)">'+head+line1+line2+'</div>'; }).join('')+'</div>';
    var pesan = lulus ? 'Hebat! Kamu sudah mencapai batas tuntas (KKM '+res.kkm+'%).' : ('Belum mencapai KKM '+res.kkm+'%.'+(res.allow_retry?' Jangan menyerah вҖ” kamu boleh mengulang untuk memperbaiki.':''));
    setMain(head('Hasil PR',esc(PRQUIZ.judul))+'<div class="info-card" style="text-align:center"><div class="score-ring" style="background:'+(lulus?'linear-gradient(135deg,#22C55E,#16A34A)':'var(--grad)')+'"><div style="font-size:28px;font-weight:700">'+res.skor+'</div><div style="font-size:10px;opacity:.9">skor</div></div><div style="font-weight:600;margin-bottom:6px">'+res.benar+' dari '+res.total+' benar'+(res.terlambat?' В· <span style="color:#B45309">terlambat</span>':'')+'</div><div style="font-size:13px;color:var(--muted);max-width:420px;margin:0 auto 8px">'+pesan+'</div>'+(res.xp_earned?'<span class="badge b-purple">+'+res.xp_earned+' XP</span>':'')+'</div>'+review+'<div style="display:flex;gap:8px;flex-wrap:wrap">'+((res.allow_retry&&!lulus)?'<button class="btn btn-primary" onclick="kerjakanPR(\''+PRQUIZ.prId+'\',\''+esc(PRQUIZ.judul)+'\')">Ulangi PR</button>':'')+'<button class="btn" onclick="renderPRSiswa()">Kembali ke Daftar PR</button></div>');
  }

  /* ===================== PENGATURAN ===================== */
  function renderPengaturan(){
    loadingMain();
    Promise.all([callServer('getAllChatToggles',STATE.token), callServer('getHakAkses',STATE.token)]).then(function(r){
      var toggles=r[0], hak=r[1];
      var html=head('Pengaturan','Kelola chat grup & hak akses fitur');
      var togHtml=toggles.map(function(t){ return '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--line2)"><span style="font-size:13px">Chat Grup '+esc(t.kelas)+'</span><div style="display:flex;align-items:center;gap:9px"><span style="font-size:12px;color:'+(t.aktif?'#15803D':'var(--soft)')+'">'+(t.aktif?'Aktif':'Nonaktif')+'</span><div class="toggle '+(t.aktif?'toggle-on':'toggle-off')+'" onclick="togglePengaturanChat(\''+esc(t.kelas)+'\','+(!t.aktif)+')"><div class="toggle-knob" style="'+(t.aktif?'right:3px':'left:3px')+'"></div></div></div></div>'; }).join('');
      var labels={upload_materi:'Upload Materi',buat_soal:'Buat Soal',kelola_siswa:'Kelola Siswa',lihat_analitik:'Lihat Analitik',chat_grup:'Chat Grup',pesan_privat:'Pesan Privat'};
      var hakHtml=Object.keys(labels).map(function(k){ return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--line2)"><span style="font-size:13px">'+labels[k]+'</span><span class="badge b-purple">'+esc(hak[k]||'-')+'</span></div>'; }).join('');
      html+='<div class="grid-2"><div class="info-card"><div class="info-card-title">Toggle Chat Grup per Kelas</div>'+togHtml+'</div><div class="info-card"><div class="info-card-title">Hak Akses Fitur</div>'+hakHtml+'<div style="font-size:11px;color:var(--soft);margin-top:10px">Hak akses saat ini mengikuti peran (role-based).</div></div></div>';
      setMain(html);
    }).catch(errMain);
  }
  function togglePengaturanChat(kelas,aktif){ callServer('setChatToggle',STATE.token,kelas,aktif).then(function(){ renderPengaturan(); toast('Chat grup '+kelas+' '+(aktif?'diaktifkan':'dinonaktifkan')); }).catch(function(e){ toast(e.message,'err'); }); }

  /* ===================== Komponen umum ===================== */
  function head(t,s){ return '<div class="page-title">'+t+'</div><div class="page-sub">'+s+'</div>'; }
  function headFlex(t,s,btn){ return '<div class="page-head"><div><div class="page-title">'+t+'</div><div class="page-sub" style="margin-bottom:0">'+s+'</div></div>'+btn+'</div>'; }
  function metric(c,l,v,sub){ return '<div class="metric '+c+'"><div class="metric-label">'+l+'</div><div class="metric-val">'+v+'</div>'+(sub?'<div style="font-size:11px;opacity:.85;margin-top:4px">'+sub+'</div>':'')+'</div>'; }
  function errMain(e){ setMain('<div class="empty">Terjadi kesalahan: '+esc(e.message||e)+'<br><br><button class="btn" onclick="navigate(\'beranda\')">Kembali ke Beranda</button></div>'); }
  function loadKelasOptions(cb){ callServer('listKelas',STATE.token).then(function(list){ cb(list.map(function(k){ return '<option value="'+esc(k.nama_kelas)+'">'+esc(k.nama_kelas)+'</option>'; }).join('')); }).catch(function(){ cb(''); }); }

  function showModal(h){ closeModal(); var ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay'; ov.onclick=function(e){ if(e.target===ov) closeModal(); }; ov.innerHTML='<div class="modal">'+h+'</div>'; document.body.appendChild(ov); }
  function closeModal(){ var m=document.getElementById('modal-overlay'); if(m) m.remove(); }

  /* Konfirmasi elegan (pengganti confirm bawaan browser) */
  function confirmDialog(opts){
    closeModal();
    var ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
    ov.onclick=function(e){ if(e.target===ov){ closeModal(); if(opts.onCancel) opts.onCancel(); } };
    var ic = opts.danger ? '<div class="confirm-icon danger">рҹ—‘пёҸ</div>' : (opts.icon==='info' ? '<div class="confirm-icon info">в„№пёҸ</div>' : '<div class="confirm-icon warn">вҡ пёҸ</div>');
    var okCls = opts.danger ? 'btn-danger-solid' : 'btn-primary';
    ov.innerHTML='<div class="confirm-box">'+ic+'<div class="confirm-title">'+esc(opts.title||'Konfirmasi')+'</div><div class="confirm-msg">'+esc(opts.message||'')+'</div><div class="confirm-actions"><button class="btn" id="cf-cancel">'+esc(opts.cancelLabel||'Batal')+'</button><button class="btn '+okCls+'" id="cf-ok">'+esc(opts.okLabel||'Ya')+'</button></div></div>';
    document.body.appendChild(ov);
    document.getElementById('cf-cancel').onclick=function(){ closeModal(); if(opts.onCancel) opts.onCancel(); };
    document.getElementById('cf-ok').onclick=function(){ closeModal(); if(opts.onOk) opts.onOk(); };
  }
  /* Notifikasi toast (pengganti alert) */
  function toast(message, type){
    var wrap=document.getElementById('toast-wrap');
    if(!wrap){ wrap=document.createElement('div'); wrap.id='toast-wrap'; document.body.appendChild(wrap); }
    var t=document.createElement('div'); t.className='toast '+(type==='err'?'err':type==='warn'?'warn':'ok');
    t.textContent=(type==='err'?'вң• ':type==='warn'?'! ':'вң“ ')+message;
    wrap.appendChild(t);
    setTimeout(function(){ t.style.transition='opacity 0.3s'; t.style.opacity='0'; setTimeout(function(){ t.remove(); },300); }, 2600);
  }

</script>
