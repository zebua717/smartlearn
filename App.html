<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <?!= include('Style'); ?>
</head>
<body>

  <!-- LOADING -->
  <div id="view-loading" class="login-wrap">
    <div style="text-align:center">
      <div class="brand-dot" style="margin:0 auto 12px;width:48px;height:48px;font-size:22px">S</div>
      <div style="color:var(--muted);font-size:13px">Memuat <?= appName ?>...</div>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="view-login" class="login-wrap hidden">
    <div class="login-box">
      <div style="text-align:center;margin-bottom:28px">
        <div class="brand-logo">S</div>
        <div style="font-size:22px;margin-bottom:4px" class="grad-text"><?= appName ?></div>
        <div style="font-size:13px;color:var(--muted)"><?= tagline ?></div>
      </div>
      <div class="card">
        <div id="login-alert" class="alert"></div>
        <button class="btn" style="width:100%;margin-bottom:18px" id="btn-google" onclick="doGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.33 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.67 14.62 48 24 48z"/></svg>
          Masuk dengan Google
        </button>
        <div class="divider-or"><div></div><span>atau</span><div></div></div>
        <div class="form-group"><label class="label">Email</label><input class="input" type="email" id="login-email" placeholder="nama@smartlearn.id" autocomplete="username"></div>
        <div class="form-group"><label class="label">Password</label><input class="input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') doManualLogin()"></div>
        <button class="btn btn-primary" style="width:100%;margin-top:6px" id="btn-login" onclick="doManualLogin()">Masuk</button>
      </div>
      <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--soft)">Akun demo: admin / guru / andi @smartlearn.id</div>
    </div>
  </div>

  <!-- APP -->
  <div id="view-app" class="hidden">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div class="topbar-brand"><div class="brand-dot">S</div><span class="grad-text"><?= appName ?></span></div>
      </div>
      <div class="topbar-right">
        <span style="font-size:13px;color:var(--muted)" id="topbar-user" class="hide-mobile"></span>
        <button id="tb-bell" onclick="navigate('notifikasi')" title="Notifikasi" style="position:relative;background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;color:#6B7280">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
          <span id="tb-notif-badge" style="display:none;position:absolute;top:0;right:0;min-width:16px;height:16px;line-height:16px;text-align:center;background:#EF4444;color:#fff;font-size:10px;font-weight:700;border-radius:9px;padding:0 3px"></span>
        </button>
        <div class="avatar" id="topbar-avatar" onclick="navigate('profil')" title="Profil"></div>
      </div>
    </div>
    <div class="layout">
      <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>
      <div class="sidebar" id="sidebar"></div>
      <div class="main" id="main-content"></div>
    </div>
  </div>

  <?!= include('Script'); ?>
</body>
</html>
