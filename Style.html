<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --grad: linear-gradient(110deg, #7C3AED 0%, #A855F7 45%, #EC4899 100%);
    --grad-btn: linear-gradient(110deg, #7C3AED, #C026D3);
    --ink: #2D2A45; --muted: #8B879F; --soft: #A8A4BC;
    --line: #ECE7FA; --line2: #F1EDFB; --bg: #F7F5FF;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: var(--ink); background: var(--bg); -webkit-font-smoothing: antialiased; }
  .hidden { display: none !important; }
  .grad-text { background: var(--grad-btn); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600; }

  /* Login */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #F7F5FF 0%, #FDF0F8 100%); padding: 20px; }
  .login-box { width: 100%; max-width: 380px; }
  .brand-logo { width: 58px; height: 58px; border-radius: 17px; background: var(--grad); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; color: #fff; font-size: 26px; font-weight: 700; }
  .card { background: #fff; border: 0.5px solid var(--line); border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(124,58,237,0.07); }
  .label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
  .form-group { margin-bottom: 15px; }
  .input, select.input, textarea.input { width: 100%; padding: 10px 13px; border: 0.5px solid #E0D8F5; border-radius: 11px; background: #fff; color: var(--ink); font-size: 13px; font-family: inherit; }
  .input:focus { outline: none; border-color: #A855F7; box-shadow: 0 0 0 3px rgba(168,85,247,0.12); }
  textarea.input { resize: vertical; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 9px 16px; border: 0.5px solid #E0D8F5; border-radius: 11px; background: #fff; cursor: pointer; font-size: 13px; color: #5B21B6; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: #E9DDFB; border-color: #A98FE0; color: #5B21B6; }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-primary { background: var(--grad-btn); color: #fff; border: none; }
  .btn-primary:hover { filter: brightness(0.94); box-shadow: 0 5px 16px rgba(124,58,237,0.32); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-danger { color: #B91C1C; border-color: #F3C9C9; }
  .btn-danger:hover { background: #FCDADA; border-color: #E9A4A4; color: #991B1B; }
  .btn-danger-solid { background: #DC2626; color: #fff; border: none; }
  .btn-danger-solid:hover { background: #B91C1C; color: #fff; box-shadow: 0 5px 16px rgba(220,38,38,0.3); }
  .divider-or { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
  .divider-or > div { flex: 1; height: 0.5px; background: var(--line); }
  .divider-or > span { font-size: 12px; color: #B5B1C9; }
  .alert { padding: 10px 13px; border-radius: 10px; font-size: 12px; margin-bottom: 14px; background: #FEE2E2; color: #B91C1C; display: none; }
  .alert.show { display: block; }

  /* Topbar + hamburger */
  .topbar { background: #fff; border-bottom: 0.5px solid var(--line); padding: 0 22px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 30; }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 16px; }
  .brand-dot { width: 34px; height: 34px; border-radius: 10px; background: var(--grad); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #A855F7, #EC4899); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; cursor: pointer; flex-shrink: 0; }
  .hamburger { display: none; background: none; border: none; cursor: pointer; color: var(--ink); padding: 6px; border-radius: 8px; }
  .hamburger:hover { background: #F4F0FE; }

  .layout { display: flex; min-height: calc(100vh - 58px); position: relative; }
  .sidebar { width: 212px; background: #fff; border-right: 0.5px solid var(--line); padding: 18px 12px; display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .sidebar-backdrop { display: none; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 10px 14px; cursor: pointer; border-radius: 11px; font-size: 13px; color: #6B6788; transition: all 0.18s; position: relative; }
  .nav-item:hover { background: #F4F0FE; color: #5B21B6; }
  .nav-item.active { color: #fff; font-weight: 600; background: var(--grad-btn); }
  .nav-dot { position: absolute; right: 12px; width: 8px; height: 8px; border-radius: 50%; background: #EC4899; }
  .nav-item.active .nav-dot { background: #fff; }
  .main { flex: 1; padding: 26px; overflow: auto; min-width: 0; }
  .page-title { font-size: 19px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
  .page-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 13px; margin-bottom: 22px; }
  .metric { border-radius: 14px; padding: 16px 18px; color: #fff; }
  .m1 { background: linear-gradient(135deg, #7C3AED, #A855F7); }
  .m2 { background: linear-gradient(135deg, #C026D3, #EC4899); }
  .m3 { background: linear-gradient(135deg, #EC4899, #FB923C); }
  .m4 { background: linear-gradient(135deg, #F97316, #FBBF24); }
  .metric-label { font-size: 12px; opacity: 0.9; margin-bottom: 6px; }
  .metric-val { font-size: 24px; font-weight: 600; }
  .info-card { background: #fff; border: 0.5px solid var(--line); border-radius: 16px; padding: 20px 22px; margin-bottom: 16px; }
  .info-card-title { font-weight: 600; margin-bottom: 14px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .badge { display: inline-flex; align-items: center; padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .b-purple { background: #F3E8FF; color: #7C3AED; } .b-pink { background: #FCE7F3; color: #BE185D; }
  .b-orange { background: #FFEDD5; color: #C2410C; } .b-green { background: #DCFCE7; color: #15803D; }
  .b-amber { background: #FEF3C7; color: #B45309; } .b-red { background: #FEE2E2; color: #B91C1C; }
  .b-gray { background: #F1EDFB; color: #6B6788; }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .table th { text-align: left; padding: 9px 12px; border-bottom: 0.5px solid var(--line); color: var(--muted); font-weight: 600; font-size: 12px; white-space: nowrap; }
  .table td { padding: 11px 12px; border-bottom: 0.5px solid var(--line2); }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: #FAF7FF; }

  .tab-row { display: flex; gap: 4px; background: #F1EDFB; padding: 4px; border-radius: 13px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 7px 16px; font-size: 13px; cursor: pointer; color: #6B6788; border-radius: 9px; transition: all 0.15s; }
  .tab.active { color: #fff; font-weight: 600; background: var(--grad-btn); }

  .material-item { display: flex; align-items: center; gap: 13px; padding: 13px; border: 0.5px solid var(--line); border-radius: 13px; margin-bottom: 9px; transition: all 0.15s; }
  .material-item:hover { background: #FAF7FF; border-color: #D8C9F5; }
  .mat-icon { width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .mat-pdf { background: linear-gradient(135deg, #FB923C, #EC4899); } .mat-doc { background: linear-gradient(135deg, #7C3AED, #A855F7); }

  .progress-bar { height: 7px; background: #F1EDFB; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7C3AED, #EC4899); border-radius: 4px; transition: width 0.3s; }

  .quiz-option { padding: 13px 17px; border: 0.5px solid var(--line); border-radius: 13px; margin-bottom: 9px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .quiz-option:hover { background: #FAF7FF; border-color: #C9B8F0; }
  .quiz-option.selected { background: #F3E8FF; border-color: #A855F7; color: #7C3AED; }
  .score-ring { width: 96px; height: 96px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; flex-direction: column; margin: 0 auto 12px; color: #fff; }

  .soal-builder-item { border: 0.5px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; background: #FAF8FF; }
  .opt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
  .opt-row .key { width: 24px; height: 24px; border-radius: 7px; background: #F1EDFB; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }

  /* Pengumuman */
  .announce-item { padding: 15px; border: 0.5px solid var(--line); border-radius: 13px; margin-bottom: 11px; border-left: 3px solid #A855F7; }
  .announce-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }

  /* Chat / Pesan */
  .chat-wrap { display: grid; grid-template-columns: 240px 1fr; gap: 16px; }
  .chat-list { background: #fff; border: 0.5px solid var(--line); border-radius: 16px; overflow: hidden; max-height: 70vh; overflow-y: auto; }
  .chat-list-item { padding: 13px 14px; border-bottom: 0.5px solid var(--line2); cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .chat-list-item:hover, .chat-list-item.active { background: #FAF7FF; }
  .chat-panel { background: #fff; border: 0.5px solid var(--line); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; height: 70vh; }
  .chat-head { padding: 13px 16px; border-bottom: 0.5px solid var(--line); font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 9px; justify-content: space-between; }
  .chat-area { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; background: #FAF8FF; }
  .chat-input { padding: 11px; border-top: 0.5px solid var(--line); display: flex; gap: 8px; }
  .msg-row { display: flex; flex-direction: column; margin-bottom: 8px; }
  .msg-bubble { padding: 10px 14px; border-radius: 14px; max-width: 80%; font-size: 13px; line-height: 1.5; word-wrap: break-word; }
  .msg-in { background: #F1EDFB; color: var(--ink); border-radius: 14px 14px 14px 3px; align-self: flex-start; }
  .msg-out { background: var(--grad-btn); color: #fff; border-radius: 14px 14px 3px 14px; align-self: flex-end; }
  .msg-meta { font-size: 10px; color: var(--soft); margin-top: 2px; }
  .msg-name { font-size: 11px; color: var(--muted); margin-bottom: 2px; }

  /* Toggle switch */
  .toggle { width: 42px; height: 24px; border-radius: 12px; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-on { background: var(--grad-btn); } .toggle-off { background: #E0D8F5; }
  .toggle-knob { width: 18px; height: 18px; border-radius: 50%; background: #fff; position: absolute; top: 3px; transition: all 0.2s; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(45,42,69,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .modal { background: #fff; border-radius: 16px; max-width: 640px; width: 100%; max-height: 88vh; overflow: auto; padding: 24px; }
  .modal-iframe { width: 100%; height: 70vh; border: none; border-radius: 12px; }
  
  /* Konfirmasi & Notifikasi */
  .confirm-box { background: #fff; border-radius: 16px; max-width: 380px; width: 100%; padding: 26px 24px; text-align: center; }
  .confirm-icon { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 24px; }
  .confirm-icon.warn { background: #FEF3C7; } .confirm-icon.danger { background: #FEE2E2; } .confirm-icon.info { background: #F3E8FF; }
  .confirm-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .confirm-msg { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 22px; }
  .confirm-actions { display: flex; gap: 9px; }
  .confirm-actions .btn { flex: 1; padding: 10px; }
  #toast-wrap { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 60; display: flex; flex-direction: column; gap: 8px; align-items: center; width: max-content; max-width: 90vw; }
  .toast { padding: 11px 18px; border-radius: 12px; font-size: 13px; color: #fff; box-shadow: 0 8px 24px rgba(45,42,69,0.22); animation: toastIn 0.25s ease; }
  .toast.ok { background: linear-gradient(110deg, #7C3AED, #C026D3); } .toast.err { background: #DC2626; } .toast.warn { background: #F59E0B; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .modal-overlay { animation: fadeIn 0.18s ease; }
  .modal, .confirm-box { animation: popIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .skeleton { background: linear-gradient(90deg, #F1EDFB 25%, #E7DFF7 37%, #F1EDFB 63%); background-size: 400% 100%; animation: shimmer 1.3s infinite; border-radius: 10px; }
  @keyframes shimmer { from { background-position: 100% 0; } to { background-position: 0 0; } }
  .msg-row.sending { opacity: 0.6; }

  .empty { text-align: center; padding: 40px 20px; color: var(--soft); font-size: 13px; }
  .badge-item { display: flex; align-items: center; gap: 11px; margin-bottom: 11px; }
  .badge-circle { width: 38px; height: 38px; border-radius: 50%; background: #F4F0FE; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label { width: 64px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .bar-track { flex: 1; height: 22px; background: #F1EDFB; border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--grad-btn); border-radius: 6px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: #fff; font-size: 11px; font-weight: 600; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(124,58,237,0.25); border-top-color: #7C3AED; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 30px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============ RESPONSIVE / MOBILE ============ */
  @media (max-width: 760px) {
    .hamburger { display: flex; }
    .hide-mobile { display: none; }
    .topbar { padding: 0 14px; }
    .main { padding: 16px; }
    .sidebar {
      position: fixed; top: 58px; left: -240px; width: 230px; height: calc(100vh - 58px);
      z-index: 40; transition: left 0.25s ease; box-shadow: 4px 0 24px rgba(45,42,69,0.12);
    }
    .sidebar.open { left: 0; }
    .sidebar-backdrop { display: block; position: fixed; inset: 58px 0 0 0; background: rgba(45,42,69,0.35); z-index: 35; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .sidebar-backdrop.show { opacity: 1; pointer-events: auto; }
    .grid-2 { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .chat-wrap { grid-template-columns: 1fr; }
    .chat-list { max-height: 200px; }
    .chat-panel { height: 60vh; }
    .modal { padding: 18px; }
    .modal-iframe { height: 60vh; }
    .page-title { font-size: 17px; }
  }
  @media (max-width: 420px) {
    .metrics { grid-template-columns: 1fr; }
  }
</style>
